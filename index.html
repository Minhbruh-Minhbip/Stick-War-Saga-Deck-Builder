<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1" name="viewport">
    <title>Stick War: Saga Deck Builder</title>
    <link href="image.png" rel="icon">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app_root">
        <div class="container">
            <div class="header">
                <div>
                    <h2>Stick War: Saga Deck Builder 1.4</h2>
                    <small style="display:block;margin-top:-10px;color:var(--text-muted);font-style:italic">
                        Made by Mỉnhbruh a.k.a Minhbip (Encountering an error? Contact me at minhbruh111@gmail.com to report it).
                    </small>
                </div>
            </div>

            <div class="tabs">
                <div class="tab-btn active" onclick="sT(0)">Deck Builder</div>
                <div class="tab-btn" onclick="sT(1)">Random Deck</div>
                <div class="tab-btn" onclick="loadDecksFromSupabase()">Community Decks</div>
            </div>
            <div id="t1" class="content-section active">
                <div class="deck-info" id="s1">Cards: 0/8 | Type: None | Status: Missing Miner/Unit</div>
                <div class="deck-display" id="d1"></div>
                <button class="btn btn-danger" onclick="clD()" style="margin-bottom:20px">Clear Deck</button>
                <button class="btn" onclick="saveCurrentDeckToSupabase()" style="margin-bottom:20px; background:var(--order)">Save to Supabase</button>
                <div id="a1"></div>
            </div>
            <div id="t2" class="content-section">
                <div class="controls-grid">
                    <button id="rb" class="btn" style="font-size:20px;padding:15px 40px" onclick="gR()">Random Deck</button>
                </div>
                <div id="sC" class="slot-machine"></div>
                <div id="rRC" style="display:none">
                    <div class="deck-info" id="s2"></div>
                    <div class="deck-display" id="d2"></div>
                </div>
            </div>
            <div id="t3" class="content-section">
                <h3 style="color:var(--primary)">Saved Decks from Backend</h3>
                <div id="community-decks-container">Đang tải từ DB...</div>
            </div>
        </div>
    </div>
    <script src="js/data.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
